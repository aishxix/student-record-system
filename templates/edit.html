<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Student</title>
    <link
      href="[https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css](https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css)"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card p-4">
            <h3 class="text-center mb-4">Edit Student</h3>
            <form action="{{ url_for('edit', id=student.id) }}" method="POST">
              <div class="mb-3">
                <label for="name" class="form-label">Full Name</label>
                <input
                  type="text"
                  class="form-control"
                  id="name"
                  name="name"
                  value="{{ student.name }}"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="roll_no" class="form-label">Roll Number</label>
                <input
                  type="text"
                  class="form-control"
                  id="roll_no"
                  name="roll_no"
                  value="{{ student.roll_no }}"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="department" class="form-label">Department</label>
                <input
                  type="text"
                  class="form-control"
                  id="department"
                  name="department"
                  value="{{ student.department }}"
                  required
                />
              </div>
              <div class="mb-4">
                <label for="semester" class="form-label">Semester</label>
                <input
                  type="number"
                  class="form-control"
                  id="semester"
                  name="semester"
                  min="1"
                  max="8"
                  value="{{ student.semester }}"
                  required
                />
              </div>
              <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary">
                  Update Student
                </button>
                <a href="{{ url_for('index') }}" class="btn btn-secondary"
                  >Cancel</a
                >
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
